<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hala Walla Executive Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9fafb; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Icons ---
    const IconClipboardList = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>;
    const IconCreditCard = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>;
    const IconBarChart2 = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>;
    const IconPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.68V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3v4.68a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>;
    const IconChevronDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>;
    const IconElephant = () => <svg viewBox="0 0 64 64" width="28" height="28" fill="currentColor"><path d="M58,34.4c-0.8-1.4-2.1-2.4-3.6-3c-1.5-0.6-3.1-0.6-4.6,0c-0.8,0.3-1.4,0.8-2,1.4c-1-1.2-2.5-1.9-4.2-1.9c-2,0-3.8,1-4.8,2.5 c-1-1.1-2.4-1.8-4-1.8c-2,0-3.8,1.1-4.7,2.8c-1.1-1.6-2.9-2.7-5-2.7c-2.3,0-4.3,1.3-5.3,3.3C18.6,35,17,35,16,35c-1.1,0-2,0.9-2,2 s0.9,2,2,2c2.1,0,4-1.3,4.9-3.2c0.3-0.7,1-1.1,1.8-1.1c1.2,0,2.2,1,2.2,2.2c0,3.3,2.7,6,6,6c0.5,0,1,0,1.5-0.1 c1.1,2.1,3.4,3.5,6,3.5c1.6,0,3.1-0.6,4.2-1.6c1.1,1,2.6,1.6,4.2,1.6c2.6,0,4.8-1.4,6-3.5c0.5,0.1,1,0.1,1.5,0.1c3.3,0,6-2.7,6-6 C60,37.3,59.2,35.7,58,34.4z M49.8,35.4c0.5-0.2,1.1-0.2,1.6,0c0.6,0.2,1,0.7,1.2,1.3c0.1,0.3,0.1,0.6,0,0.9c-0.1,0.3-0.3,0.5-0.5,0.7 c-0.2,0.2-0.5,0.3-0.8,0.4c-0.3,0.1-0.6,0.1-0.9,0c-0.6-0.2-1-0.7-1.2-1.3C49.1,36.5,49.3,35.8,49.8,35.4z"/><path d="M12,28c0-8.8,7.2-16,16-16s16,7.2,16,16v2h4v-2c0-11-9-20-20-20S8,17,8,28v2h4V28z"/></svg>;
    const IconTent = () => <svg viewBox="0 0 64 64" width="28" height="28" fill="currentColor"><path d="M32,4L4,24v36h56V24L32,4z M32,10.3l20,14.3v4.1L32,14.4L12,28.7v-4.1L32,10.3z M12,34.4l20-14.3l20,14.3v21.6H12V34.4z"/><rect x="28" y="42" width="8" height="14"/></svg>;
    const IconBus = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>;
    const IconBuilding = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>;
    const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
    const IconChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;

    // ลิงก์ Web App (Backend)
    const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbyVSGSC5sNwOfxwQvTwi0kpBtUsGn6-4SnsBFqqHNBqjGRoVYR0EFXGOMuuAHVUakTE/exec";

    function App() {
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('overview');
      const [errorMsg, setErrorMsg] = useState("");
      
      // ตัวแปรเก็บวันที่สำหรับการดู Daily Ops (ค่าเริ่มต้นคือวันนี้)
      const [opsDate, setOpsDate] = useState(new Date());
      
      const [dashboardData, setDashboardData] = useState({
        currentMonthText: "กำลังโหลดข้อมูล...",
        currentMonthValue: "",
        overview: { tourOnly: 0, hotelOnly: 0 },
        themeParks: { fantasea: { initialQuota: 183, used: 0 }, carnivalMagic: { initialQuota: 1200, used: 0 } },
        yearlyReport: [],
        dailyOps: { tours: [], hotels: [] }
      });

      useEffect(() => {
        const fetchData = async () => {
          try {
            const response = await fetch(GOOGLE_API_URL);
            const data = await response.json();
            setDashboardData(data);
            setLoading(false);
          } catch (err) {
            console.error("Fetch Error:", err);
            setErrorMsg("เชื่อมต่อข้อมูลไม่สำเร็จ กรุณาลองรีเฟรชหน้าเว็บอีกครั้ง");
            setLoading(false);
          }
        };
        fetchData();
      }, []);

      const formatCurrency = (amount) => new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount || 0) + " ฿";
      const formatNumber = (num) => new Intl.NumberFormat('th-TH').format(num || 0);

      const getMonthName = (ym) => {
        if (!ym || !ym.includes("-")) return ym;
        const [y, m] = ym.split("-");
        const monthNames = ["", "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        return `${monthNames[parseInt(m, 10)]} ${parseInt(y) + 543}`;
      };

      // ฟังก์ชันเลื่อนวันที่
      const changeOpsDate = (days) => {
        const newDate = new Date(opsDate);
        newDate.setDate(newDate.getDate() + days);
        setOpsDate(newDate);
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center">
            <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <div className="text-xl font-semibold text-gray-500">กำลังดึงข้อมูลล่าสุดจาก Google Sheets...</div>
          </div>
        );
      }

      if (errorMsg) {
        return (
          <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center text-red-500 p-8 text-center">
            <h2 className="text-2xl font-bold mb-4">พบข้อผิดพลาด</h2>
            <p>{errorMsg}</p>
          </div>
        );
      }

      const currentYear = (dashboardData?.currentMonthValue || new Date().getFullYear().toString()).split('-')[0];
      const thisYearReport = (dashboardData?.yearlyReport || []).filter(r => r.month.startsWith(currentYear));
      
      let displayTourProfit = 0;
      let displayHotelProfit = 0;

      if (activeTab === 'overview') {
        displayTourProfit = dashboardData?.overview?.tourOnly || 0;
        displayHotelProfit = dashboardData?.overview?.hotelOnly || 0;
      } else if (activeTab === 'yearlyReport') {
        displayTourProfit = thisYearReport.reduce((sum, r) => sum + (r.tourProfit || 0), 0);
        displayHotelProfit = thisYearReport.reduce((sum, r) => sum + (r.hotelProfit || 0), 0);
      }
      
      const displayTotalProfit = displayTourProfit + displayHotelProfit;
      const fantaseaRemaining = (dashboardData?.themeParks?.fantasea?.initialQuota || 0) - (dashboardData?.themeParks?.fantasea?.used || 0);
      const carnivalRemaining = (dashboardData?.themeParks?.carnivalMagic?.initialQuota || 0) - (dashboardData?.themeParks?.carnivalMagic?.used || 0);

      // --------------------------------------------------------
      // ระบบกรองวันที่ (Daily Ops Filter)
      // --------------------------------------------------------
      const y = opsDate.getFullYear();
      const m = String(opsDate.getMonth() + 1).padStart(2, '0');
      const d = String(opsDate.getDate()).padStart(2, '0');
      const targetDateYMD = `${y}-${m}-${d}`; // รูปแบบ YYYY-MM-DD เพื่อเอาไปเทียบกับข้อมูลที่ส่งมาจาก Backend

      const rawTours = dashboardData?.dailyOps?.tours || [];
      const rawHotels = dashboardData?.dailyOps?.hotels || [];

      // กรองเฉพาะทัวร์ที่เป็นของวันที่เลือก
      const filteredTours = rawTours.filter(t => t.dateStr === targetDateYMD);

      // กรองเฉพาะโรงแรมที่ "เช็คอิน" ในวันที่เลือก
      const filteredHotels = rawHotels.filter(h => h.dateStr === targetDateYMD);

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 font-sans p-4 md:p-8 lg:p-12 animate-fade-in">
          <div className="max-w-7xl mx-auto">
            
            <div className="mb-6 flex justify-between items-end">
              <div>
                <h1 className="text-2xl font-bold text-gray-900">Executive Dashboard</h1>
                <p className="text-sm text-gray-600 mt-1">
                  {activeTab === 'overview' ? 'ภาพรวมประจำเดือนปัจจุบัน' : 
                   activeTab === 'yearlyReport' ? `รายงานสรุปรายปี (Yearly Report ${parseInt(currentYear) + 543})` :
                   'รายงานการดำเนินงานประจำวัน (Daily Operations)'}
                </p>
              </div>
            </div>

            {/* Navigation Bar */}
            <div className="bg-white border border-gray-200 rounded-xl p-2 mb-8 flex flex-col md:flex-row justify-between items-center shadow-sm">
              <div className="flex space-x-1 overflow-x-auto w-full md:w-auto no-scrollbar">
                <button 
                  onClick={() => setActiveTab('overview')}
                  className={`flex items-center px-4 py-2 rounded-lg text-sm font-bold whitespace-nowrap transition-colors ${activeTab === 'overview' ? 'bg-blue-50 text-blue-600' : 'text-gray-500 hover:bg-gray-50'}`}>
                  ภาพรวม
                </button>
                <button 
                  onClick={() => setActiveTab('dailyOps')}
                  className={`flex items-center px-4 py-2 rounded-lg text-sm font-bold whitespace-nowrap transition-colors ${activeTab === 'dailyOps' ? 'bg-blue-50 text-blue-600' : 'text-gray-500 hover:bg-gray-50'}`}>
                  <IconClipboardList /> <span className="ml-2">Daily Ops</span>
                </button>
                <button className="flex items-center px-4 py-2 text-gray-500 hover:bg-gray-50 rounded-lg text-sm font-semibold transition-colors whitespace-nowrap">
                  <IconCreditCard /> <span className="ml-2">Payment Due</span>
                </button>
                <button 
                  onClick={() => setActiveTab('yearlyReport')}
                  className={`flex items-center px-4 py-2 rounded-lg text-sm font-bold whitespace-nowrap transition-colors ${activeTab === 'yearlyReport' ? 'bg-blue-50 text-blue-600' : 'text-gray-500 hover:bg-gray-50'}`}>
                  <IconBarChart2 /> <span className="ml-2">Yearly Report</span>
                </button>
                <button className="flex items-center px-4 py-2 text-gray-500 hover:bg-gray-50 rounded-lg text-sm font-semibold transition-colors whitespace-nowrap">
                  <span className="text-red-500"><IconPin /></span> <span className="ml-2">Other</span> <span className="ml-1 text-gray-400"><IconChevronDown /></span>
                </button>
              </div>
              
              <div className="mt-4 md:mt-0 px-2 w-full md:w-auto">
                {activeTab !== 'dailyOps' && (
                  <div className="px-4 py-1.5 flex items-center bg-green-50 text-green-700 border border-green-200 rounded-lg shadow-sm">
                    <span className="text-sm font-bold">
                      {activeTab === 'overview' ? (dashboardData?.currentMonthText || "รายรับเดือนปัจจุบัน") : `รายรับรวมทั้งปี ${parseInt(currentYear) + 543}`}
                    </span>
                  </div>
                )}
              </div>
            </div>

            {/* ส่วนแสดงผล: ภาพรวม หรือ รายปี */}
            {(activeTab === 'overview' || activeTab === 'yearlyReport') && (
              <>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                  <div className="bg-white rounded-xl border border-gray-200 p-6 shadow-sm hover:shadow-md transition-all duration-200">
                    <h3 className="text-sm font-bold text-gray-600 mb-4">{activeTab === 'overview' ? 'รายได้รวมทัวร์' : 'ทัวร์ (ยอดรวมทั้งปี)'}</h3>
                    <p className="text-3xl font-extrabold text-gray-900 tracking-tight">{formatCurrency(displayTourProfit)}</p>
                  </div>
                  <div className="bg-white rounded-xl border border-gray-200 p-6 shadow-sm hover:shadow-md transition-all duration-200">
                    <h3 className="text-sm font-bold text-gray-600 mb-4">{activeTab === 'overview' ? 'รายได้รวมโรงแรม' : 'โรงแรม (ยอดรวมทั้งปี)'}</h3>
                    <p className="text-3xl font-extrabold text-gray-900 tracking-tight">{formatCurrency(displayHotelProfit)}</p>
                  </div>
                  <div className="bg-white rounded-xl border border-gray-200 p-6 shadow-sm hover:shadow-md transition-all duration-200">
                    <h3 className="text-sm font-bold text-gray-600 mb-4">{activeTab === 'overview' ? 'รายได้รวมทั้งหมด' : 'รวมทั้งหมด (ปีนี้)'}</h3>
                    <p className="text-3xl font-extrabold text-blue-600 tracking-tight">{formatCurrency(displayTotalProfit)}</p>
                  </div>
                </div>

                {activeTab === 'overview' && (
                  <div className="animate-fade-in">
                    <h2 className="text-sm font-extrabold text-gray-800 mb-4">Theme Park Status</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="bg-white rounded-xl border border-gray-200 p-8 shadow-sm hover:shadow-md transition-shadow">
                        <div className="flex items-center mb-8">
                          <div className="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center mr-4 text-gray-600 border border-gray-100">
                            <IconElephant />
                          </div>
                          <h3 className="font-semibold text-gray-800">Phuket Fantasea</h3>
                        </div>
                        <div className="border-t border-dashed border-gray-200 mb-6"></div>
                        <div className="grid grid-cols-3 gap-4 text-center">
                          <div>
                            <p className="text-3xl font-bold text-blue-500 mb-1">{formatNumber(dashboardData?.themeParks?.fantasea?.initialQuota)}</p>
                            <p className="text-xs font-bold text-gray-500 uppercase">ทั้งหมด</p>
                          </div>
                          <div>
                            <p className={`text-3xl font-bold mb-1 ${(dashboardData?.themeParks?.fantasea?.used || 0) > 0 ? 'text-red-500' : 'text-gray-400'}`}>{formatNumber(dashboardData?.themeParks?.fantasea?.used)}</p>
                            <p className="text-xs font-bold text-gray-500 uppercase">ใช้ไป</p>
                          </div>
                          <div>
                            <p className={`text-3xl font-bold mb-1 ${fantaseaRemaining < 0 ? 'text-red-500' : 'text-green-500'}`}>{formatNumber(fantaseaRemaining)}</p>
                            <p className="text-xs font-bold text-gray-500 uppercase">คงเหลือ</p>
                          </div>
                        </div>
                      </div>

                      <div className="bg-white rounded-xl border border-gray-200 p-8 shadow-sm hover:shadow-md transition-shadow">
                        <div className="flex items-center mb-8">
                          <div className="w-12 h-12 bg-red-50 rounded-full flex items-center justify-center mr-4 text-red-500 border border-red-100">
                            <IconTent />
                          </div>
                          <h3 className="font-semibold text-gray-800">Carnival Magic</h3>
                        </div>
                        <div className="border-t border-dashed border-gray-200 mb-6"></div>
                        <div className="grid grid-cols-3 gap-4 text-center">
                          <div>
                            <p className="text-3xl font-bold text-blue-500 mb-1">{formatNumber(dashboardData?.themeParks?.carnivalMagic?.initialQuota)}</p>
                            <p className="text-xs font-bold text-gray-500 uppercase">ทั้งหมด</p>
                          </div>
                          <div>
                            <p className={`text-3xl font-bold mb-1 ${(dashboardData?.themeParks?.carnivalMagic?.used || 0) > 0 ? 'text-red-500' : 'text-gray-400'}`}>{formatNumber(dashboardData?.themeParks?.carnivalMagic?.used)}</p>
                            <p className="text-xs font-bold text-gray-500 uppercase">ใช้ไป</p>
                          </div>
                          <div>
                            <p className={`text-3xl font-bold mb-1 ${carnivalRemaining < 0 ? 'text-red-500' : 'text-green-500'}`}>{formatNumber(carnivalRemaining)}</p>
                            <p className="text-xs font-bold text-gray-500 uppercase">คงเหลือ</p>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'yearlyReport' && (
                  <div className="animate-fade-in">
                    <h2 className="text-sm font-extrabold text-gray-800 mb-4">รายละเอียดรายเดือน (ปี {parseInt(currentYear) + 543})</h2>
                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                      <div className="overflow-x-auto">
                        <table className="min-w-full divide-y divide-gray-200">
                          <thead className="bg-gray-50">
                            <tr>
                              <th className="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">เดือน</th>
                              <th className="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">รายได้ทัวร์</th>
                              <th className="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">รายได้โรงแรม</th>
                              <th className="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">รวมทั้งหมด</th>
                            </tr>
                          </thead>
                          <tbody className="bg-white divide-y divide-gray-100">
                            {thisYearReport.length === 0 ? (
                              <tr><td colSpan="4" className="px-6 py-8 text-center text-gray-500">ไม่พบข้อมูลของปีนี้ในหน้า Yearly Report</td></tr>
                            ) : (
                              thisYearReport.map((row, idx) => (
                                <tr key={idx} className="hover:bg-blue-50 transition-colors">
                                  <td className="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-700">{getMonthName(row.month)}</td>
                                  <td className="px-6 py-4 whitespace-nowrap text-sm text-right text-gray-600">{formatCurrency(row.tourProfit)}</td>
                                  <td className="px-6 py-4 whitespace-nowrap text-sm text-right text-gray-600">{formatCurrency(row.hotelProfit)}</td>
                                  <td className="px-6 py-4 whitespace-nowrap text-sm font-bold text-right text-blue-600">{formatCurrency(row.totalProfit)}</td>
                                </tr>
                              ))
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}
              </>
            )}

            {/* ส่วนแสดงผล: Daily Ops */}
            {activeTab === 'dailyOps' && (
              <div className="animate-fade-in space-y-6">
                
                {/* แผงควบคุมวันที่ เลื่อนไป-มา ได้อิสระ */}
                <div className="flex flex-col sm:flex-row items-center justify-between mb-4 bg-white p-3 rounded-xl border border-gray-200 shadow-sm">
                  <h2 className="text-lg font-extrabold text-gray-800 mb-3 sm:mb-0 ml-2">รายการปฏิบัติงาน</h2>
                  <div className="flex items-center space-x-2 bg-gray-50 p-1.5 rounded-lg border border-gray-200">
                    <button onClick={() => changeOpsDate(-1)} className="p-2 bg-white hover:bg-gray-100 rounded-md shadow-sm border border-gray-200 transition-colors text-gray-600 flex items-center justify-center" title="ดูเมื่อวาน">
                      <IconChevronLeft />
                    </button>
                    <div className="px-4 py-1 flex flex-col items-center justify-center min-w-[140px]">
                      <span className="text-sm font-bold text-gray-800">
                        {opsDate.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' })}
                      </span>
                    </div>
                    <button onClick={() => changeOpsDate(1)} className="p-2 bg-white hover:bg-gray-100 rounded-md shadow-sm border border-gray-200 transition-colors text-gray-600 flex items-center justify-center" title="ดูวันพรุ่งนี้">
                      <IconChevronRight />
                    </button>
                    <button onClick={() => setOpsDate(new Date())} className="ml-2 px-3 py-1.5 bg-blue-50 text-blue-600 hover:bg-blue-100 font-bold text-xs rounded-md transition-colors border border-blue-100">
                      วันนี้
                    </button>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  
                  {/* กรอบทัวร์ */}
                  <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden flex flex-col h-full">
                    <div className="bg-blue-50 border-b border-blue-100 px-6 py-4 flex items-center">
                      <div className="bg-blue-100 text-blue-600 p-2 rounded-lg mr-3">
                        <IconBus />
                      </div>
                      <h3 className="font-bold text-gray-800">ทัวร์ (Tours)</h3>
                      <span className="ml-auto bg-blue-600 text-white text-xs font-bold px-2 py-1 rounded-full">
                        {filteredTours.length} รายการ
                      </span>
                    </div>
                    <div className="p-4 flex-1">
                      {filteredTours.length === 0 ? (
                        <div className="flex flex-col items-center justify-center h-40 text-gray-400">
                          <IconClipboardList />
                          <p className="mt-2 text-sm">ไม่มีรายการทัวร์ในวันที่เลือก</p>
                        </div>
                      ) : (
                        <div className="space-y-3">
                          {filteredTours.map((t, idx) => (
                            <div key={idx} className="flex items-center p-3 border border-gray-100 rounded-lg hover:border-blue-300 hover:shadow-sm transition-all bg-gray-50/50">
                              <div className="bg-gray-800 text-white text-xs font-bold px-2 py-1 rounded mr-3 min-w-[3rem] text-center">
                                {t.voucher}
                              </div>
                              <div className="flex-1 min-w-0">
                                <p className="font-bold text-sm text-gray-800 truncate">{t.customer}</p>
                                <p className="text-xs text-gray-500 truncate">{t.tour}</p>
                              </div>
                              <div className="ml-2 flex-shrink-0">
                                <span className="inline-flex items-center px-2 py-1 rounded-md text-xs font-medium bg-blue-50 text-blue-700 border border-blue-100">
                                  {t.agent}
                                </span>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>

                  {/* กรอบโรงแรม */}
                  <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden flex flex-col h-full">
                    <div className="bg-purple-50 border-b border-purple-100 px-6 py-4 flex items-center">
                      <div className="bg-purple-100 text-purple-600 p-2 rounded-lg mr-3">
                        <IconBuilding />
                      </div>
                      <h3 className="font-bold text-gray-800">เช็คอินโรงแรม (Check-ins)</h3>
                      <span className="ml-auto bg-purple-600 text-white text-xs font-bold px-2 py-1 rounded-full">
                        {filteredHotels.length} รายการ
                      </span>
                    </div>
                    <div className="p-4 flex-1">
                      {filteredHotels.length === 0 ? (
                        <div className="flex flex-col items-center justify-center h-40 text-gray-400">
                          <IconClipboardList />
                          <p className="mt-2 text-sm">ไม่มีรายการเช็คอินโรงแรมในวันที่เลือก</p>
                        </div>
                      ) : (
                        <div className="space-y-3">
                          {filteredHotels.map((h, idx) => (
                            <div key={idx} className="flex items-center p-3 border border-gray-100 rounded-lg hover:border-purple-300 hover:shadow-sm transition-all bg-gray-50/50">
                              <div className="bg-gray-800 text-white text-xs font-bold px-2 py-1 rounded mr-3 min-w-[3rem] text-center">
                                {h.voucher}
                              </div>
                              <div className="flex-1 min-w-0">
                                <p className="font-bold text-sm text-gray-800 truncate">{h.customer}</p>
                                <p className="text-xs text-gray-500 truncate">{h.hotel}</p>
                                <p className="text-[10px] text-gray-400 mt-0.5">{h.stayDate}</p>
                              </div>
                              <div className="ml-2 flex-shrink-0">
                                <span className="inline-flex items-center px-2 py-1 rounded-md text-xs font-medium bg-purple-50 text-purple-700 border border-purple-100">
                                  {h.agent}
                                </span>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>

                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
